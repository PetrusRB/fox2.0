services:
  envoy:
    image: envoyproxy/envoy:v1.31.6
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.server
    ports:
      - "50051:50051"
    restart: unless-stopped
